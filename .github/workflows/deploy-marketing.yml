name: Deploy Marketing Site (isolated)

# Only this workflow and the marketing/ folder control the GitHub Pages site.
# The root Electron desktop application is completely unaffected.

on:
  push:
    branches: [main]
    paths:
      - 'marketing/**'
      - '.github/workflows/deploy-marketing.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: marketing/package-lock.json

      - name: Install dependencies (marketing folder only)
        run: cd marketing && npm ci

      - name: Build Astro site
        run: cd marketing && npm run build
        env:
          # Astro uses the base + site from astro.config.mjs
          NODE_ENV: production

      - name: Upload artifact (only the built marketing/dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: marketing/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
